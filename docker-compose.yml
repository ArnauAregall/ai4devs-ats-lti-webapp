services:
  postgres:
    image: postgres:16
    container_name: lti-ats-postgres
    environment:
      POSTGRES_DB: lti_ats
      POSTGRES_USER: lti_ats
      POSTGRES_PASSWORD: lti_ats
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lti_ats -d lti_ats"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["docker"]
    build:
      context: .
      dockerfile: lti-ats-backend/Dockerfile
    container_name: lti-ats-backend
    image: lti-ats-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/lti_ats
      SPRING_DATASOURCE_USERNAME: lti_ats
      SPRING_DATASOURCE_PASSWORD: lti_ats
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    profiles: ["docker"]
    build:
      context: ./lti-ats-frontend
      dockerfile: Dockerfile
    container_name: lti-ats-frontend
    image: lti-ats-frontend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
